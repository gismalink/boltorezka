name: boltorezka

services:
  boltorezka-turn:
    image: coturn/coturn:4.6.3
    container_name: boltorezka-turn
    restart: unless-stopped
    user: "0:0"
    command:
      - sh
      - -ec
      - |
        TURN_LISTEN_IP_ARG=""
        TURN_RELAY_IP_ARG=""
        TURN_VERBOSE_ARG=""
        if [ -n "$${TURN_LISTEN_IP:-}" ]; then
          TURN_LISTEN_IP_ARG="--listening-ip=$${TURN_LISTEN_IP}"
        fi
        if [ -n "$${TURN_RELAY_IP:-}" ]; then
          TURN_RELAY_IP_ARG="--relay-ip=$${TURN_RELAY_IP}"
        fi
        if [ "${TURN_VERBOSE:-1}" = "1" ]; then
          TURN_VERBOSE_ARG="--verbose"
        fi

        exec turnserver \
          --no-cli \
          --simple-log \
          --listening-port=3478 \
          --tls-listening-port=5349 \
          --fingerprint \
          --lt-cred-mech \
          --realm=${TURN_REALM:-gismalink.art} \
          --external-ip=${TURN_EXTERNAL_IP:-95.165.154.118} \
          $${TURN_LISTEN_IP_ARG} \
          $${TURN_RELAY_IP_ARG} \
          --user="${TURN_USERNAME}:${TURN_PASSWORD}" \
          --cert=/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/${TURN_CERT_DOMAIN:-gismalink.art}/${TURN_CERT_DOMAIN:-gismalink.art}.crt \
          --pkey=/caddy-data/caddy/certificates/acme-v02.api.letsencrypt.org-directory/${TURN_CERT_DOMAIN:-gismalink.art}/${TURN_CERT_DOMAIN:-gismalink.art}.key \
          --min-port=${TURN_MIN_PORT:-30000} \
          --max-port=${TURN_MAX_PORT:-31000} \
          $${TURN_VERBOSE_ARG}
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "${TURN_MIN_PORT:-30000}-${TURN_MAX_PORT:-31000}:${TURN_MIN_PORT:-30000}-${TURN_MAX_PORT:-31000}/udp"
      - "${TURN_MIN_PORT:-30000}-${TURN_MAX_PORT:-31000}:${TURN_MIN_PORT:-30000}-${TURN_MAX_PORT:-31000}/tcp"
    volumes:
      - ingress_caddy_data:/caddy-data:ro
    networks:
      - edge_public

  boltorezka-api-test:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      additional_contexts:
        web: ../apps/web
      args:
        VITE_RTC_ICE_SERVERS_JSON: ${TEST_VITE_RTC_ICE_SERVERS_JSON:-}
        VITE_RTC_ICE_TRANSPORT_POLICY: ${TEST_VITE_RTC_ICE_TRANSPORT_POLICY:-all}
        VITE_RTC_RECONNECT_MAX_ATTEMPTS: ${TEST_VITE_RTC_RECONNECT_MAX_ATTEMPTS:-3}
        VITE_RTC_RECONNECT_BASE_DELAY_MS: ${TEST_VITE_RTC_RECONNECT_BASE_DELAY_MS:-1000}
        VITE_RTC_RECONNECT_MAX_DELAY_MS: ${TEST_VITE_RTC_RECONNECT_MAX_DELAY_MS:-8000}
        VITE_APP_VERSION: ${TEST_VITE_APP_VERSION:-}
        VITE_APP_BUILD_DATE: ${TEST_VITE_APP_BUILD_DATE:-}
    image: boltorezka-api:test
    container_name: boltorezka-api-test
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://${TEST_POSTGRES_USER}:${TEST_POSTGRES_PASSWORD}@boltorezka-db-test:5432/${TEST_POSTGRES_DB}
      REDIS_URL: redis://boltorezka-redis-test:6379
      JWT_SECRET: ${TEST_JWT_SECRET}
      JWT_EXPIRES_IN: ${TEST_JWT_EXPIRES_IN:-12h}
      CORS_ORIGIN: ${TEST_CORS_ORIGIN:-https://test.boltorezka.gismalink.art}
      AUTH_MODE: sso
      AUTH_SSO_BASE_URL: ${TEST_AUTH_SSO_BASE_URL:-https://test.auth.gismalink.art}
      ALLOWED_RETURN_HOSTS: ${TEST_ALLOWED_RETURN_HOSTS:-test.boltorezka.gismalink.art}
      SUPER_ADMIN_EMAIL: ${TEST_SUPER_ADMIN_EMAIL:-gismalink@gmail.com}
      AUTH_COOKIE_MODE: ${TEST_AUTH_COOKIE_MODE:-0}
      AUTH_SESSION_COOKIE_NAME: ${TEST_AUTH_SESSION_COOKIE_NAME:-boltorezka_session_test}
      AUTH_SESSION_COOKIE_SECURE: ${TEST_AUTH_SESSION_COOKIE_SECURE:-1}
      AUTH_SESSION_COOKIE_SAMESITE: ${TEST_AUTH_SESSION_COOKIE_SAMESITE:-Lax}
      AUTH_SESSION_COOKIE_DOMAIN: ${TEST_AUTH_SESSION_COOKIE_DOMAIN:-.test.boltorezka.gismalink.art}
      AUTH_SESSION_COOKIE_PATH: ${TEST_AUTH_SESSION_COOKIE_PATH:-/}
      AUTH_SESSION_COOKIE_MAX_AGE_SEC: ${TEST_AUTH_SESSION_COOKIE_MAX_AGE_SEC:-2592000}
      WS_CALL_DEBUG: ${TEST_WS_CALL_DEBUG:-0}
      APP_VERSION: ${TEST_APP_VERSION:-0.1.0}
      APP_BUILD_SHA: ${TEST_APP_BUILD_SHA:-}
      API_SERVE_STATIC: ${TEST_API_SERVE_STATIC:-0}
      LIVEKIT_ENABLED: ${TEST_LIVEKIT_ENABLED:-1}
      LIVEKIT_URL: ${TEST_LIVEKIT_URL:-wss://test.boltorezka.gismalink.art}
      LIVEKIT_API_KEY: ${LIVEKIT_TEST_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_TEST_API_SECRET:-}
      LIVEKIT_TOKEN_TTL_SEC: ${TEST_LIVEKIT_TOKEN_TTL_SEC:-1800}
    depends_on:
      boltorezka-turn:
        condition: service_started
      boltorezka-db-test:
        condition: service_healthy
      boltorezka-redis-test:
        condition: service_healthy
    networks:
      - edge_public
      - data_test

  boltorezka-db-test:
    image: postgres:16
    container_name: boltorezka-db-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB}
      POSTGRES_USER: ${TEST_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${TEST_POSTGRES_USER} -d ${TEST_POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data_test

  boltorezka-redis-test:
    image: redis:7-alpine
    container_name: boltorezka-redis-test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - data_test

  boltorezka-livekit-test:
    image: livekit/livekit-server:v1.9.12
    container_name: boltorezka-livekit-test
    restart: unless-stopped
    profiles: ["livekit-test"]
    environment:
      LIVEKIT_TEST_API_KEY: ${LIVEKIT_TEST_API_KEY:-}
      LIVEKIT_TEST_API_SECRET: ${LIVEKIT_TEST_API_SECRET:-}
      LIVEKIT_TEST_SIGNAL_PORT: ${TEST_LIVEKIT_SIGNAL_PORT:-7880}
      LIVEKIT_TEST_TCP_PORT: ${TEST_LIVEKIT_TCP_PORT:-7881}
      LIVEKIT_TEST_RTC_PORT_START: ${TEST_LIVEKIT_RTC_PORT_START:-34000}
      LIVEKIT_TEST_RTC_PORT_END: ${TEST_LIVEKIT_RTC_PORT_END:-34999}
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        if [ -z "${LIVEKIT_TEST_API_KEY:-}" ] || [ -z "${LIVEKIT_TEST_API_SECRET:-}" ]; then
          echo "[livekit-test] LIVEKIT_TEST_API_KEY and LIVEKIT_TEST_API_SECRET must be set" >&2
          exit 1
        fi
        cat > /tmp/livekit.yaml <<EOF
        port: ${TEST_LIVEKIT_SIGNAL_PORT:-7880}
        bind_addresses:
          - "0.0.0.0"
        rtc:
          tcp_port: ${TEST_LIVEKIT_TCP_PORT:-7881}
          port_range_start: ${TEST_LIVEKIT_RTC_PORT_START:-34000}
          port_range_end: ${TEST_LIVEKIT_RTC_PORT_END:-34999}
          use_external_ip: true
        redis:
          address: boltorezka-redis-test:6379
        logging:
          level: info
        EOF
        exec /livekit-server --config /tmp/livekit.yaml --keys "${LIVEKIT_TEST_API_KEY}: ${LIVEKIT_TEST_API_SECRET}"
    ports:
      - "${TEST_LIVEKIT_SIGNAL_PORT:-7880}:7880/tcp"
      - "${TEST_LIVEKIT_TCP_PORT:-7881}:7881/tcp"
      - "${TEST_LIVEKIT_RTC_PORT_START:-34000}-${TEST_LIVEKIT_RTC_PORT_END:-34999}:${TEST_LIVEKIT_RTC_PORT_START:-34000}-${TEST_LIVEKIT_RTC_PORT_END:-34999}/udp"
    depends_on:
      boltorezka-redis-test:
        condition: service_healthy
    networks:
      - edge_public
      - data_test

  boltorezka-api-prod:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      additional_contexts:
        web: ../apps/web
      args:
        VITE_RTC_ICE_SERVERS_JSON: ${PROD_VITE_RTC_ICE_SERVERS_JSON:-}
        VITE_RTC_ICE_TRANSPORT_POLICY: ${PROD_VITE_RTC_ICE_TRANSPORT_POLICY:-all}
        VITE_RTC_RECONNECT_MAX_ATTEMPTS: ${PROD_VITE_RTC_RECONNECT_MAX_ATTEMPTS:-3}
        VITE_RTC_RECONNECT_BASE_DELAY_MS: ${PROD_VITE_RTC_RECONNECT_BASE_DELAY_MS:-1000}
        VITE_RTC_RECONNECT_MAX_DELAY_MS: ${PROD_VITE_RTC_RECONNECT_MAX_DELAY_MS:-8000}
        VITE_APP_VERSION: ${PROD_VITE_APP_VERSION:-}
        VITE_APP_BUILD_DATE: ${PROD_VITE_APP_BUILD_DATE:-}
    image: boltorezka-api:prod
    container_name: boltorezka-api-prod
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://${PROD_POSTGRES_USER}:${PROD_POSTGRES_PASSWORD}@boltorezka-db-prod:5432/${PROD_POSTGRES_DB}
      REDIS_URL: redis://boltorezka-redis-prod:6379
      JWT_SECRET: ${PROD_JWT_SECRET}
      JWT_EXPIRES_IN: ${PROD_JWT_EXPIRES_IN:-12h}
      CORS_ORIGIN: ${PROD_CORS_ORIGIN:-https://boltorezka.gismalink.art}
      AUTH_MODE: sso
      AUTH_SSO_BASE_URL: ${PROD_AUTH_SSO_BASE_URL:-https://auth.gismalink.art}
      ALLOWED_RETURN_HOSTS: ${PROD_ALLOWED_RETURN_HOSTS:-boltorezka.gismalink.art}
      SUPER_ADMIN_EMAIL: ${PROD_SUPER_ADMIN_EMAIL:-gismalink@gmail.com}
      AUTH_COOKIE_MODE: ${PROD_AUTH_COOKIE_MODE:-0}
      AUTH_SESSION_COOKIE_NAME: ${PROD_AUTH_SESSION_COOKIE_NAME:-boltorezka_session}
      AUTH_SESSION_COOKIE_SECURE: ${PROD_AUTH_SESSION_COOKIE_SECURE:-1}
      AUTH_SESSION_COOKIE_SAMESITE: ${PROD_AUTH_SESSION_COOKIE_SAMESITE:-Lax}
      AUTH_SESSION_COOKIE_DOMAIN: ${PROD_AUTH_SESSION_COOKIE_DOMAIN:-.boltorezka.gismalink.art}
      AUTH_SESSION_COOKIE_PATH: ${PROD_AUTH_SESSION_COOKIE_PATH:-/}
      AUTH_SESSION_COOKIE_MAX_AGE_SEC: ${PROD_AUTH_SESSION_COOKIE_MAX_AGE_SEC:-2592000}
      WS_CALL_DEBUG: ${PROD_WS_CALL_DEBUG:-0}
      APP_VERSION: ${PROD_APP_VERSION:-0.1.0}
      APP_BUILD_SHA: ${PROD_APP_BUILD_SHA:-}
      API_SERVE_STATIC: ${PROD_API_SERVE_STATIC:-0}
      LIVEKIT_ENABLED: ${PROD_LIVEKIT_ENABLED:-1}
      LIVEKIT_URL: ${PROD_LIVEKIT_URL:-wss://boltorezka.gismalink.art}
      LIVEKIT_API_KEY: ${PROD_LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${PROD_LIVEKIT_API_SECRET:-}
      LIVEKIT_TOKEN_TTL_SEC: ${PROD_LIVEKIT_TOKEN_TTL_SEC:-1800}
    depends_on:
      boltorezka-turn:
        condition: service_started
      boltorezka-db-prod:
        condition: service_healthy
      boltorezka-redis-prod:
        condition: service_healthy
    networks:
      - edge_public
      - data_prod

  boltorezka-db-prod:
    image: postgres:16
    container_name: boltorezka-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PROD_POSTGRES_DB}
      POSTGRES_USER: ${PROD_POSTGRES_USER}
      POSTGRES_PASSWORD: ${PROD_POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PROD_POSTGRES_USER} -d ${PROD_POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data_prod

  boltorezka-redis-prod:
    image: redis:7-alpine
    container_name: boltorezka-redis-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - data_prod

  boltorezka-livekit-prod:
    image: livekit/livekit-server:v1.9.12
    container_name: boltorezka-livekit-prod
    restart: unless-stopped
    profiles: ["livekit-prod"]
    environment:
      LIVEKIT_PROD_API_KEY: ${PROD_LIVEKIT_API_KEY:-}
      LIVEKIT_PROD_API_SECRET: ${PROD_LIVEKIT_API_SECRET:-}
      LIVEKIT_PROD_SIGNAL_PORT: ${PROD_LIVEKIT_SIGNAL_PORT:-7880}
      LIVEKIT_PROD_TCP_PORT: ${PROD_LIVEKIT_TCP_PORT:-7882}
      LIVEKIT_PROD_RTC_PORT_START: ${PROD_LIVEKIT_RTC_PORT_START:-35000}
      LIVEKIT_PROD_RTC_PORT_END: ${PROD_LIVEKIT_RTC_PORT_END:-35999}
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        if [ -z "$${LIVEKIT_PROD_API_KEY:-}" ] || [ -z "$${LIVEKIT_PROD_API_SECRET:-}" ]; then
          echo "[livekit-prod] PROD_LIVEKIT_API_KEY and PROD_LIVEKIT_API_SECRET must be set" >&2
          exit 1
        fi
        cat > /tmp/livekit.yaml <<EOF
        port: ${PROD_LIVEKIT_SIGNAL_PORT:-7880}
        bind_addresses:
          - "0.0.0.0"
        rtc:
          tcp_port: ${PROD_LIVEKIT_TCP_PORT:-7882}
          port_range_start: ${PROD_LIVEKIT_RTC_PORT_START:-35000}
          port_range_end: ${PROD_LIVEKIT_RTC_PORT_END:-35999}
          use_external_ip: true
        redis:
          address: boltorezka-redis-prod:6379
        logging:
          level: info
        EOF
        exec /livekit-server --config /tmp/livekit.yaml --keys "$${LIVEKIT_PROD_API_KEY}: $${LIVEKIT_PROD_API_SECRET}"
    ports:
      - "${PROD_LIVEKIT_TCP_PORT:-7882}:${PROD_LIVEKIT_TCP_PORT:-7882}/tcp"
      - "${PROD_LIVEKIT_RTC_PORT_START:-35000}-${PROD_LIVEKIT_RTC_PORT_END:-35999}:${PROD_LIVEKIT_RTC_PORT_START:-35000}-${PROD_LIVEKIT_RTC_PORT_END:-35999}/udp"
    depends_on:
      boltorezka-redis-prod:
        condition: service_healthy
    networks:
      - edge_public
      - data_prod

networks:
  edge_public:
    external: true
  data_test:
    driver: bridge
  data_prod:
    driver: bridge

volumes:
  postgres_test_data:
  postgres_prod_data:
  ingress_caddy_data:
    external: true
    name: edge_caddy_data
