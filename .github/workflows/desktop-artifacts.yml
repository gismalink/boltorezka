name: desktop-artifacts

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Desktop update channel"
        required: false
        default: "test"
        type: choice
        options:
          - test
          - prod
      signed:
        description: "Build signed/notarized release candidate"
        required: false
        default: false
        type: boolean
      create_release_draft:
        description: "Create GitHub draft release from signed artifacts"
        required: false
        default: false
        type: boolean
      signed_platforms:
        description: "Which platform(s) should run signed path"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - windows-only
          - mac-only
      windows_signing_provider:
        description: "Windows signing provider for signed workflow"
        required: false
        default: "azure-oidc"
        type: choice
        options:
          - azure-oidc
          - pfx

concurrency:
  group: desktop-artifacts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  build-desktop:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop-electron ci

      - name: Resolve signing plan
        id: sign_plan
        shell: bash
        run: |
          signed_dispatch="false"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.signed }}" == "true" ]]; then
            signed_dispatch="true"
          fi

          sign_current="false"
          if [[ "$signed_dispatch" == "true" ]]; then
            case "${{ github.event.inputs.signed_platforms || 'all' }}" in
              all)
                sign_current="true"
                ;;
              windows-only)
                [[ "${{ matrix.platform }}" == "windows" ]] && sign_current="true"
                ;;
              mac-only)
                [[ "${{ matrix.platform }}" == "mac" ]] && sign_current="true"
                ;;
            esac
          fi

          use_azure_windows="false"
          if [[ "$sign_current" == "true" && "${{ matrix.platform }}" == "windows" && "${{ github.event.inputs.windows_signing_provider || 'azure-oidc' }}" == "azure-oidc" ]]; then
            use_azure_windows="true"
          fi

          echo "signed_dispatch=$signed_dispatch" >> "$GITHUB_OUTPUT"
          echo "sign_current=$sign_current" >> "$GITHUB_OUTPUT"
          echo "use_azure_windows=$use_azure_windows" >> "$GITHUB_OUTPUT"

      - name: Build desktop unpacked artifact
        if: ${{ steps.sign_plan.outputs.sign_current != 'true' }}
        shell: bash
        run: |
          APP_BUILD_SHA="${GITHUB_SHA}" npm --prefix apps/desktop-electron run build

      - name: Build Windows release candidate (Azure signing path)
        if: ${{ steps.sign_plan.outputs.use_azure_windows == 'true' }}
        shell: bash
        env:
          ELECTRON_UPDATE_CHANNEL: ${{ github.event.inputs.release_channel || 'test' }}
          APP_BUILD_SHA: ${{ github.sha }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
          WIN_CSC_LINK: ""
          WIN_CSC_KEY_PASSWORD: ""
        run: |
          if [[ "${ELECTRON_UPDATE_CHANNEL}" == "prod" ]]; then
            npm --prefix apps/desktop-electron run dist:prod
          else
            npm --prefix apps/desktop-electron run dist:test
          fi

      - name: Build signed desktop release candidate
        if: ${{ steps.sign_plan.outputs.sign_current == 'true' && steps.sign_plan.outputs.use_azure_windows != 'true' }}
        shell: bash
        env:
          ELECTRON_UPDATE_CHANNEL: ${{ github.event.inputs.release_channel || 'test' }}
          APP_BUILD_SHA: ${{ github.sha }}
          CSC_LINK: ${{ secrets.DESKTOP_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.DESKTOP_APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DESKTOP_APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.DESKTOP_APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.DESKTOP_WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.DESKTOP_WIN_CSC_KEY_PASSWORD }}
        run: |
          if [[ "${ELECTRON_UPDATE_CHANNEL}" == "prod" ]]; then
            npm --prefix apps/desktop-electron run dist:prod
          else
            npm --prefix apps/desktop-electron run dist:test
          fi

      - name: Azure login (OIDC for Windows signing)
        if: ${{ steps.sign_plan.outputs.use_azure_windows == 'true' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_TRUSTED_SIGNING_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TRUSTED_SIGNING_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_TRUSTED_SIGNING_SUBSCRIPTION_ID }}

      - name: Sign Windows artifacts with Azure Trusted Signing
        if: ${{ steps.sign_plan.outputs.use_azure_windows == 'true' }}
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\apps\desktop-electron\dist
          files-folder-filter: exe,msi
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}-${{ github.sha }}-${{ steps.sign_plan.outputs.sign_current == 'true' && 'signed' || 'unsigned' }}
          path: apps/desktop-electron/dist/**
          if-no-files-found: error

  github-release-chain:
    name: github-release-chain
    runs-on: ubuntu-latest
    needs: build-desktop
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.signed == 'true' }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: .release-artifacts
          merge-multiple: false

      - name: Build release manifest
        shell: bash
        env:
          RELEASE_CHANNEL: ${{ github.event.inputs.release_channel || 'test' }}
          SIGNED: ${{ github.event.inputs.signed }}
          CREATE_RELEASE_DRAFT: ${{ github.event.inputs.create_release_draft }}
          GIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const root = path.resolve(".release-artifacts");
          const releaseRoot = path.resolve(".release-output");
          fs.mkdirSync(releaseRoot, { recursive: true });

          const isFile = (p) => {
            try {
              return fs.statSync(p).isFile();
            } catch {
              return false;
            }
          };

          const collectFiles = (dir) => {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            const files = [];
            for (const entry of entries) {
              const abs = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                files.push(...collectFiles(abs));
              } else if (entry.isFile()) {
                files.push(abs);
              }
            }
            return files;
          };

          const artifactDirs = fs.existsSync(root)
            ? fs.readdirSync(root, { withFileTypes: true })
                .filter((entry) => entry.isDirectory())
                .map((entry) => path.join(root, entry.name))
            : [];

          const releaseFiles = [];
          const artifacts = artifactDirs.map((dir) => {
            const files = collectFiles(dir).filter((filePath) => isFile(filePath));
            const relFiles = files.map((filePath) => path.relative(path.resolve("."), filePath));
            releaseFiles.push(...relFiles);
            return {
              artifactName: path.basename(dir),
              files: relFiles,
              fileCount: relFiles.length
            };
          });

          const manifest = {
            generatedAt: new Date().toISOString(),
            gitSha: String(process.env.GIT_SHA || ""),
            refName: String(process.env.REF_NAME || ""),
            workflowRunId: String(process.env.RUN_ID || ""),
            workflowRunNumber: String(process.env.RUN_NUMBER || ""),
            releaseChannel: String(process.env.RELEASE_CHANNEL || "test"),
            signed: String(process.env.SIGNED || "false") === "true",
            createReleaseDraft: String(process.env.CREATE_RELEASE_DRAFT || "false") === "true",
            artifacts,
            totalFiles: releaseFiles.length
          };

          fs.writeFileSync(path.join(releaseRoot, "desktop-release-manifest.json"), `${JSON.stringify(manifest, null, 2)}\n`, "utf8");

          const shortSha = String(process.env.GIT_SHA || "").slice(0, 7) || "unknown";
          const releaseTag = `desktop-${manifest.releaseChannel}-${shortSha}-run${manifest.workflowRunNumber}`;
          fs.writeFileSync(path.join(releaseRoot, "release-tag.txt"), `${releaseTag}\n`, "utf8");
          fs.writeFileSync(path.join(releaseRoot, "release-files.txt"), `${releaseFiles.join("\n")}\n`, "utf8");
          NODE

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-manifest-${{ github.sha }}
          path: .release-output/desktop-release-manifest.json
          if-no-files-found: error

      - name: Create GitHub draft release
        if: ${{ github.event.inputs.create_release_draft == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="$(cat .release-output/release-tag.txt | tr -d '\r\n')"
          RELEASE_CHANNEL="${{ github.event.inputs.release_channel || 'test' }}"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          mapfile -t RELEASE_FILES < <(grep -v '^$' .release-output/release-files.txt)

          if [[ "${#RELEASE_FILES[@]}" -eq 0 ]]; then
            echo "[github-release-chain] no files to publish"
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "[github-release-chain] draft already exists: $RELEASE_TAG"
            gh release upload "$RELEASE_TAG" "${RELEASE_FILES[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${RELEASE_FILES[@]}" \
              --draft \
              --title "Desktop ${RELEASE_CHANNEL} signed RC (${SHORT_SHA})" \
              --notes "Signed desktop release candidate.\n\nChannel: ${RELEASE_CHANNEL}\nCommit: ${GITHUB_SHA}\nWorkflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi

      - name: Workflow summary
        shell: bash
        run: |
          echo "## Desktop GitHub Release Chain" >> "$GITHUB_STEP_SUMMARY"
          echo "- Signed build: true" >> "$GITHUB_STEP_SUMMARY"
          echo "- Channel: ${{ github.event.inputs.release_channel || 'test' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Manifest artifact: desktop-release-manifest-${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Draft release requested: ${{ github.event.inputs.create_release_draft || 'false' }}" >> "$GITHUB_STEP_SUMMARY"
