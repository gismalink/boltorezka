name: test-smoke

on:
  workflow_dispatch:
    inputs:
      extended_rtc:
        description: 'Enable extended realtime smoke (call-signal + 3-way race)'
        required: false
        default: '0'

concurrency:
  group: test-smoke-workflow
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test smoke
        env:
          SMOKE_API_URL: ${{ vars.TEST_SMOKE_API_URL || 'https://test.boltorezka.gismalink.art' }}
          SMOKE_TEST_BEARER_TOKEN: ${{ secrets.TEST_SMOKE_TEST_BEARER_TOKEN }}
          SMOKE_TEST_BEARER_TOKEN_SECOND: ${{ secrets.TEST_SMOKE_TEST_BEARER_TOKEN_SECOND }}
          SMOKE_TEST_BEARER_TOKEN_THIRD: ${{ secrets.TEST_SMOKE_TEST_BEARER_TOKEN_THIRD }}
          SMOKE_EXTENDED_RTC: ${{ github.event.inputs.extended_rtc || vars.TEST_SMOKE_EXTENDED_RTC || '0' }}
          SMOKE_TELEMETRY_SUMMARY: '1'
        run: |
          SMOKE_REQUIRE_INITIAL_STATE_REPLAY=1 \
          SMOKE_CALL_SIGNAL="$SMOKE_EXTENDED_RTC" \
          SMOKE_CALL_RACE_3WAY="$SMOKE_EXTENDED_RTC" \
          npm run check:required
