name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: API typecheck
        working-directory: apps/api
        run: npm run typecheck

      - name: API unit tests
        working-directory: apps/api
        run: npm test

      - name: Web build (includes typecheck)
        working-directory: apps/web
        run: npm run build

      - name: Web unit tests
        working-directory: apps/web
        run: npm test
